<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jumbotron Zoom Animation — Demo</title>

    <!-- CSS de la animación -->
    <link rel="stylesheet" href="jumbotron-zoom-animation.css" />

    <!-- Estilos de ejemplo para el contenido (puedes eliminar esto) -->
    <style>
        /* Reset básico */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #fff;
            background: #000;
        }

        /* Estilos para el contenido de ejemplo dentro del jumbotron */
        .demo-title {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 200;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .demo-subtitle {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            color: #fff;
            margin-bottom: 2rem;
            letter-spacing: 0.01em;
        }

        .demo-description {
            font-size: clamp(1rem, 2vw, 1.3rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.6;
            max-width: 600px;
            margin-bottom: 2rem;
        }

        .demo-cta {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 300;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 0;
            background: #0078d4;
            color: #fff;
            transition: all 0.3s ease;
        }

        .demo-cta:hover {
            background: #106ebe;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 120, 212, 0.4);
        }

        /* Sección siguiente al jumbotron (para ver el efecto del scroll) */
        .next-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            padding: 4rem 2rem;
        }

        .next-section h2 {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 200;
            color: #fff;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- ============================================================
       JUMBOTRON — Copia esta estructura a tu proyecto
       ============================================================ -->
    <div class="jumbotron-bg" id="jumbotron">
        <!-- 
      Cambia "tu-imagen.jpg" por la ruta de tu imagen de fondo.
      Recomendación: usa una imagen de alta resolución (1920x1080 mínimo)
    -->
        <img class="jumbotron-img" src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1920&q=80"
            alt="Background" />

        <div class="jumbotron-content">
            <h1 class="demo-title">Tu Título Aquí</h1>
            <p class="demo-subtitle">Subtítulo descriptivo</p>
            <p class="demo-description">
                Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
            </p>
            <button class="demo-cta">Explorar</button>
        </div>
    </div>

    <!-- Sección siguiente para que se vea el efecto de scroll -->
    <section class="next-section">
        <h2>Siguiente Sección</h2>
    </section>

    <!-- Más contenido para scroll -->
    <section class="next-section" style="background: #111;">
        <h2>Más Contenido</h2>
    </section>

    <!-- ============================================================
       SCRIPTS — GSAP + ScrollTrigger (CDN) + tu animación
       ============================================================ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="jumbotron-zoom-animation.js"></script>

</body>

</html>
